<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hexagon Spiral Animation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: #a0c4ff;
    }
    #svg-container {
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      overflow: hidden;
    }
    svg {
      display: block;
    }
    .axis line, .axis path { stroke: #2a2a4a; }
    .axis text { fill: #4a4a6a; font-size: 10px; }
    .grid line { stroke: #1e1e38; stroke-dasharray: 2,4; }
    .spiral-segment {
      stroke: #00d4ff;
      stroke-width: 1.8;
      stroke-linecap: round;
      fill: none;
      opacity: 0.85;
    }
    .spiral-point {
      fill: #ff6b6b;
      stroke: #ff9f9f;
      stroke-width: 1;
    }
    .hex-vertex {
      fill: #ffd700;
      opacity: 0.5;
    }
    .origin-dot {
      fill: #ffffff;
      opacity: 0.4;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #1e3a5f;
      color: #a0c4ff;
      border: 1px solid #3a6a9f;
      border-radius: 5px;
      padding: 7px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.15s;
    }
    button:hover { background: #2a4f7f; }
    #slider {
      -webkit-appearance: none;
      width: 260px;
      height: 5px;
      border-radius: 3px;
      background: #2a2a4a;
      outline: none;
    }
    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
    }
    #counter {
      font-size: 0.9rem;
      color: #7a9abf;
      min-width: 90px;
      text-align: center;
    }
    #meta {
      font-size: 0.78rem;
      color: #4a6a8a;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Hexagon Spiral</h1>
  <div id="svg-container"></div>
  <div id="controls">
    <button id="playBtn">&#9646;&#9646; Pause</button>
    <input type="range" id="slider" min="0" value="0" />
    <span id="counter">Frame 0 / 0</span>
  </div>
  <div id="meta"></div>

  <script>
    const W = Math.min(window.innerWidth - 40, 600);
    const H = W;
    const MARGIN = 40;
    const INTERVAL_MS = 80;

    // Coordinate range in data space
    const DATA_RANGE = 9.5;

    const svg = d3.select('#svg-container')
      .append('svg')
      .attr('width', W)
      .attr('height', H);

    const xScale = d3.scaleLinear()
      .domain([-DATA_RANGE, DATA_RANGE])
      .range([MARGIN, W - MARGIN]);

    const yScale = d3.scaleLinear()
      .domain([-DATA_RANGE, DATA_RANGE])
      .range([H - MARGIN, MARGIN]);

    // Grid
    const gridG = svg.append('g').attr('class', 'grid');
    const ticks = [-8, -6, -4, -2, 0, 2, 4, 6, 8];
    ticks.forEach(v => {
      gridG.append('line')
        .attr('x1', xScale(v)).attr('x2', xScale(v))
        .attr('y1', MARGIN).attr('y2', H - MARGIN);
      gridG.append('line')
        .attr('y1', yScale(v)).attr('y2', yScale(v))
        .attr('x1', MARGIN).attr('x2', W - MARGIN);
    });

    // Axes
    const xAxis = d3.axisBottom(xScale).tickValues(ticks).tickSize(4);
    const yAxis = d3.axisLeft(yScale).tickValues(ticks).tickSize(4);
    svg.append('g').attr('class', 'axis')
      .attr('transform', `translate(0,${yScale(0)})`)
      .call(xAxis);
    svg.append('g').attr('class', 'axis')
      .attr('transform', `translate(${xScale(0)},0)`)
      .call(yAxis);

    // Origin dot
    svg.append('circle').attr('class', 'origin-dot')
      .attr('cx', xScale(0)).attr('cy', yScale(0)).attr('r', 3);

    // Hexagon vertices (faint reference)
    const hexVerts = [
      [8, 0], [4, 6.928], [-4, 6.928],
      [-8, 0], [-4, -6.928], [4, -6.928]
    ];
    svg.selectAll('.hex-vertex')
      .data(hexVerts)
      .enter().append('circle')
      .attr('class', 'hex-vertex')
      .attr('cx', d => xScale(d[0]))
      .attr('cy', d => yScale(d[1]))
      .attr('r', 4);

    // Hex outline
    const hexLine = d3.line()
      .x(d => xScale(d[0]))
      .y(d => yScale(d[1]));
    svg.append('path')
      .datum([...hexVerts, hexVerts[0]])
      .attr('d', hexLine)
      .attr('fill', 'none')
      .attr('stroke', '#ffd700')
      .attr('stroke-width', 0.6)
      .attr('opacity', 0.2);

    // Group for spiral segments and points
    const spiralG = svg.append('g');
    const pointG  = svg.append('g');

    // State
    let frames = [];
    let currentFrame = 0;
    let playing = true;
    let timer = null;

    const slider   = document.getElementById('slider');
    const counter  = document.getElementById('counter');
    const playBtn  = document.getElementById('playBtn');
    const metaDiv  = document.getElementById('meta');

    function renderFrame(idx) {
      if (!frames.length) return;
      idx = Math.max(0, Math.min(idx, frames.length - 1));
      currentFrame = idx;
      slider.value = idx;
      counter.textContent = `Frame ${idx} / ${frames.length - 1}`;

      const segs = frames[idx];

      // Segments
      const lines = spiralG.selectAll('line').data(segs);
      lines.enter().append('line').attr('class', 'spiral-segment')
        .merge(lines)
        .attr('x1', d => xScale(d.x1))
        .attr('y1', d => yScale(d.y1))
        .attr('x2', d => xScale(d.x2))
        .attr('y2', d => yScale(d.y2));
      lines.exit().remove();

      // Current end point
      if (segs.length > 0) {
        const last = segs[segs.length - 1];
        const pts = pointG.selectAll('circle').data([{ x: last.x2, y: last.y2 }]);
        pts.enter().append('circle').attr('class', 'spiral-point').attr('r', 4)
          .merge(pts)
          .attr('cx', d => xScale(d.x))
          .attr('cy', d => yScale(d.y));
        pts.exit().remove();
      } else {
        pointG.selectAll('circle').remove();
      }
    }

    function startTimer() {
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        if (currentFrame >= frames.length - 1) {
          clearInterval(timer);
          playing = false;
          playBtn.textContent = '▶ Play';
          return;
        }
        renderFrame(currentFrame + 1);
      }, INTERVAL_MS);
    }

    playBtn.addEventListener('click', () => {
      playing = !playing;
      if (playing) {
        playBtn.innerHTML = '&#9646;&#9646; Pause';
        if (currentFrame >= frames.length - 1) {
          renderFrame(0);
        }
        startTimer();
      } else {
        playBtn.textContent = '▶ Play';
        if (timer) clearInterval(timer);
      }
    });

    slider.addEventListener('input', () => {
      if (timer) clearInterval(timer);
      playing = false;
      playBtn.textContent = '▶ Play';
      renderFrame(parseInt(slider.value));
    });

    // Load data
    fetch('./anim.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        const meta = data.meta || {};
        metaDiv.textContent =
          (meta.description || '') +
          (meta.frameCount != null ? `  •  ${meta.frameCount} frames` : '');

        // Parse frames: each frame is an array of segment objects
        frames = (data.frames || []).map(frameArr =>
          frameArr.filter(obj => obj.type === 'segment')
        );

        slider.max = frames.length - 1;
        renderFrame(0);
        startTimer();
      })
      .catch(err => {
        metaDiv.innerHTML =
          `<span style="color:#ff6b6b">Error loading anim.json: ${err.message}.<br>` +
          `Run the spiral executable and redirect output to viz/anim.json first.</span>`;
      });
  </script>
</body>
</html>
